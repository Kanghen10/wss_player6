<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>CCTV WSS Player</title>

<style>

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
background:black;
overflow:hidden;
}

video-stream{
width:100%;
height:100%;
display:block;
}

#loading{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-family:Arial;
font-size:18px;
}

</style>

</head>

<body>

<div id="loading">Loading Stream...</div>

<script type="module" src="https://alexxit.github.io/go2rtc/video-stream.js"></script>

<script type="module">

const loading = document.getElementById("loading");

function getStreamFromHash(){

let hash = location.hash.replace("#","");

if(!hash) return null;

const match = hash.match(/src=([^&]+)/);

if(match){
return decodeURIComponent(match[1]);
}

return hash;

}

function start(){

const stream = getStreamFromHash();

if(!stream){
loading.innerText="NO STREAM";
return;
}

const video = document.createElement("video-stream");

video.background = true;

video.style.width="100%";
video.style.height="100%";

/* endpoint player server */
video.src = "https://paspro-streaming.co.id/view/api/ws?src=" + stream;

video.addEventListener("playing", ()=>{
loading.style.display="none";
});

document.body.appendChild(video);

}

window.addEventListener("load",start);

</script>

</body>
</html>
