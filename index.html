<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>CCTV Player</title>

<style>

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
background:black;
overflow:hidden;
}

iframe{
border:none;
width:100%;
height:100%;
}

</style>

</head>

<body>

<iframe id="player"></iframe>

<script>

function start(){

let hash = location.hash.replace("#","");

if(!hash) return;

/* ambil src dari url */
let match = hash.match(/src=([^&]+)/);

let stream = "";

if(match){
stream = match[1];
}else{
stream = hash;
}

/* buka player asli */
document.getElementById("player").src =
"https://paspro-streaming.co.id/view/stream.html?src=" + stream;

}

window.onload = start;

</script>

</body>
</html>
