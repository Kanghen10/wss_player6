<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>CCTV WSS Player</title>

<style>

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
background:black;
overflow:hidden;
}

video-stream{
width:100%;
height:100%;
}

#loading{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-family:Arial;
font-size:18px;
}

</style>

</head>

<body>

<div id="loading">Loading Stream...</div>

<script type="module" src="https://alexxit.github.io/go2rtc/video-stream.js"></script>

<script type="module">

const loading = document.getElementById("loading");

function startPlayer(){

const hash = location.hash.replace("#","");

if(!hash){
loading.innerText="NO STREAM";
return;
}

// jika user memasukkan WSS penuh
let streamName = hash;

const match = hash.match(/src=([^&]+)/);

if(match){
streamName = decodeURIComponent(match[1]);
}

const video = document.createElement("video-stream");

video.background = true;
video.style.width="100%";
video.style.height="100%";

// buat URL websocket seperti referensi
video.src = "wss://paspro-streaming.co.id/view/api/ws?src=" + streamName;

video.addEventListener("playing", ()=>{
loading.style.display="none";
});

document.body.appendChild(video);

}

window.addEventListener("load", startPlayer);

</script>

</body>
</html>
